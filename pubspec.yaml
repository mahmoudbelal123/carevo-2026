name: carevo_app_2026
description: "Carevo — Mobile Car Wash App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Supabase (auth + database + storage)
  supabase_flutter: ^2.5.9

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Code generation / immutable models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Image handling
  cached_network_image: ^3.3.1

  # URL launcher (InstaPay link)
  url_launcher: ^6.3.0

  # Image picker (payment proof upload)
  image_picker: ^1.1.2

  # Intl / date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
